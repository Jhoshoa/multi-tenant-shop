version: "3.9"

# PostgreSQL lo provee Supabase — solo Redis y Meilisearch locales

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.10
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-masterkey}
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data

volumes:
  redis_data:
  meilisearch_data:
